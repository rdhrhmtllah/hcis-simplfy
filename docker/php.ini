; ===== docker/php.ini =====
; PHP Configuration
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_vars = 3000

; FIX: SQL Server / ODBC Configuration untuk Cloud Run
; Buffer size untuk large result sets
pdo_sqlsrv.client_buffer_max_kb_size = 10240
sqlsrv.ClientBufferMaxKBSize = 10240
; Log level: 0=off, dimatikan di production untuk performa
sqlsrv.LogSeverity = 0
pdo_sqlsrv.log_severity = 0
